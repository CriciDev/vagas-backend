info:
  name: Health
  type: http
  seq: 1

http:
  method: get
  url: "{{baseUrl}}/health"

headers:
  - name: Accept
    value: application/json
    enabled: true

auth:
  mode: none

body:
  mode: none

runtime:
  scripts:
    - type: tests
      code: |-
        test("health returns 200", function() {
          expect(res.status).to.equal(200);
        });

        test("health returns ok", function() {
          expect(res.body.status).to.equal("ok");
        });
