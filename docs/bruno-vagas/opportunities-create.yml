info:
  name: Create opportunity
  type: http
  seq: 10

http:
  method: post
  url: "{{baseUrl}}/api/opportunities"
  headers:
    - name: Accept
      value: application/json
      enabled: true
    - name: Content-Type
      value: application/json
      enabled: true
    - name: Authorization
      value: Bearer {{token}}
      enabled: true
  body:
    type: json
    data: |-
      {
        "title": "Go Developer",
        "description": "Build community tools",
        "organization_name": "Criciuma Devs",
        "organization_url": "https://criciumadevs.local",
        "type": "full_time",
        "work_mode": "remote",
        "location": "Criciuma",
        "salary_range": "R$ 8k - R$ 12k",
        "seniority": "senior",
        "skills": ["Go", "PostgreSQL"],
        "contact_email": "jobs@criciumadevs.local"
      }

runtime:
  scripts:
    - type: tests
      code: |-
        test("create opportunity returns 201", function() {
          expect(res.status).to.equal(201);
        });

        test("create opportunity returns id", function() {
          expect(res.body.id).to.be.a("number").and.greaterThan(0);
        });
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body.id
        method: jsonq
      variable:
        name: opportunityId
        scope: runtime
