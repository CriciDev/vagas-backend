info:
  name: Login
  type: http
  seq: 2

http:
  method: post
  url: "{{baseUrl}}/api/auth/login"

headers:
  - name: Accept
    value: application/json
    enabled: true
  - name: Content-Type
    value: application/json
    enabled: true

auth:
  mode: none

body:
  mode: json
  json: |-
    {
      "email": "{{adminEmail}}",
      "password": "{{adminPassword}}"
    }
