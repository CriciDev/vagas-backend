info:
  name: Create developer
  type: http
  seq: 4

http:
  method: post
  url: "{{baseUrl}}/api/developers"
  headers:
    - name: Accept
      value: application/json
      enabled: true
    - name: Content-Type
      value: application/json
      enabled: true
    - name: Authorization
      value: Bearer {{token}}
      enabled: true
  body:
    type: json
    data: |-
      {
        "name": "Ada Lovelace",
        "email": "{{developerEmail}}",
        "skills": ["Go", "Angular"],
        "available": true,
        "bio": "Dev da comunidade"
      }

runtime:
  scripts:
    - type: before-request
      code: |-
        bru.setVar("developerEmail", `ada-${Date.now()}@example.com`);
    - type: tests
      code: |-
        test("create returns 201", function() {
          expect(res.status).to.equal(201);
        });

        test("create returns developer id", function() {
          expect(res.body.id).to.be.a("number").and.greaterThan(0);
        });
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body.id
        method: jsonq
      variable:
        name: developerId
        scope: runtime
