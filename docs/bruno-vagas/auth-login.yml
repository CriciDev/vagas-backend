info:
  name: Login
  type: http
  seq: 2

http:
  method: post
  url: "{{baseUrl}}/api/auth/login"
  headers:
    - name: Accept
      value: application/json
      enabled: true
    - name: Content-Type
      value: application/json
      enabled: true
  body:
    type: json
    data: |-
      {
        "email": "{{adminEmail}}",
        "password": "{{adminPassword}}"
      }

runtime:
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body.token
        method: jsonq
      variable:
        name: token
        scope: runtime
  scripts:
    - type: tests
      code: |-
        test("login returns 200", function() {
          expect(res.status).to.equal(200);
        });

        test("login returns token", function() {
          expect(res.body.token).to.be.a("string").and.not.empty;
        });
